---
"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    name: ${{ matrix.variant }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04-arm  # arm64
          - ubuntu-24.04      # x86
          - macos-26          # arm64
          - macos-15-intel    # x86
          - windows-11-arm    # arm64
          - windows-2025      # x86
        variant:
          # Bug A: `--main-entry-point` alone crashes immediately in early
          # output-path setup with `AttributeError` on `_main_module`.
          - bug-a
          # Bug B: same flag plus the `--output-folder-name` workaround
          # for bug A surfaces the next missing-state failure: NuitkaCodeDeficit
          # from the first `locateModule` call (no `_main_paths` set up).
          - bug-b
          # Bug C: the maintainer's comment on #3879 names `--project-name`
          # as the hidden option that satisfies the missing-project-name
          # conflict introduced on factory. This variant tests whether
          # pairing `--main-entry-point` with `--project-name=cli` produces
          # a working binary.
          - bug-c
          # Baseline: positional package + `--python-flag=-m` builds and runs.
          - baseline
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      BIN_EXT: ${{ contains(matrix.os, 'windows') && '.exe' || '.bin' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.13"
      - name: Setup venv
        run: |
          uv --no-progress venv --python 3.13.13
      - name: Install Nuitka
        run: |
          uv --no-progress pip install "Nuitka[onefile] @ git+https://github.com/Nuitka/Nuitka.git@factory" "uv_build==0.11.13"
      - name: nuitka --version
        run: |
          uv --no-progress run -- python -m nuitka --version

      # Bug A — expected to FAIL with:
      #   AttributeError: 'NoneType' object has no attribute 'getOutputFilename'
      # at OutputDirectories._getResultBaseName, because no positional script
      # populated `_main_module`.
      - name: "Bug A: --main-entry-point alone"
        if: matrix.variant == 'bug-a'
        run: >
          uv --no-progress run -- python -m nuitka
          --mode=onefile --assume-yes-for-downloads
          --output-filename="cli${BIN_EXT}"
          --main-entry-point=cli=cli.cli_code:my_cli

      # Bug B — expected to FAIL with:
      #   nuitka.Errors.NuitkaCodeDeficit: Error, cannot locate modules
      #   before import mechanism is setup.
      # at importing.Importing.locateModule, because `_main_paths` is never
      # populated when `--main-entry-point` is used without a positional
      # script (only `addMainScriptDirectory` populates it).
      - name: "Bug B: --main-entry-point + --output-folder-name workaround"
        if: matrix.variant == 'bug-b'
        run: >
          uv --no-progress run -- python -m nuitka
          --mode=onefile --assume-yes-for-downloads
          --output-filename="cli${BIN_EXT}"
          --output-folder-name=cli-bug-b
          --main-entry-point=cli=cli.cli_code:my_cli

      # Bug C: tests the hidden `--project-name` option the maintainer
      # named in #3879 as the way to satisfy factory's new missing-project-
      # name conflict when using `--main-entry-point`.
      - name: "Bug C: --main-entry-point + --project-name"
        if: matrix.variant == 'bug-c'
        run: >
          uv --no-progress run -- python -m nuitka
          --mode=onefile --assume-yes-for-downloads
          --output-filename="cli${BIN_EXT}"
          --project-name=cli
          --main-entry-point=cli=cli.cli_code:my_cli

      # Baseline — expected to SUCCEED. The legacy positional-package +
      # `--python-flag=-m` invocation builds a working binary.
      - name: "Baseline: positional package + --python-flag=-m"
        if: matrix.variant == 'baseline'
        run: >
          uv --no-progress run -- python -m nuitka
          --mode=onefile --assume-yes-for-downloads
          --output-filename="cli${BIN_EXT}"
          --python-flag=-m cli

      # Bug B and Bug C may emit a crash report; preserve it for inspection.
      - name: Upload Nuitka crash report
        if: always() && (matrix.variant == 'bug-b' || matrix.variant == 'bug-c')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: nuitka-crash-report-${{ matrix.variant }}-${{ matrix.os }}
          if-no-files-found: ignore
          path: nuitka-crash-report.xml

      - name: Install exiftool - Linux
        if: matrix.variant == 'baseline' && runner.os == 'Linux'
        run: |
          sudo apt --quiet --yes install exiftool
      - name: Install exiftool - macOS
        if: matrix.variant == 'baseline' && runner.os == 'macOS'
        run: |
          brew install exiftool
      - name: Install exiftool - Windows
        if: matrix.variant == 'baseline' && runner.os == 'Windows'
        run: |
          choco install exiftool --no-progress --yes
      - name: Baseline binary metadata
        # Ubuntu:
        #   CPU Type      : Arm 64-bits (Armv8/AArch64)
        #   CPU Type      : AMD x86-64
        # macOS:
        #   CPU Type      : ARM 64-bit
        #   CPU Type      : x86 64-bit
        # Windows
        #   Machine Type  : ARM64 little endian
        #   Machine Type  : AMD AMD64
        if: matrix.variant == 'baseline'
        run: |
          exiftool${{ runner.os == 'Windows' && '.exe' || '' }} "cli${BIN_EXT}"
      - name: Set binary permissions
        if: (matrix.variant == 'baseline' || matrix.variant == 'bug-c') && runner.os != 'Windows'
        run: |
          chmod +x "cli${BIN_EXT}"
      - name: Run binary
        if: matrix.variant == 'baseline' || matrix.variant == 'bug-c'
        run: |
          "./cli${BIN_EXT}"
