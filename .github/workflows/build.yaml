---
"on":
  push:
    branches:
      - main

jobs:

  build:
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm  # arm64
          - ubuntu-24.04      # x86
          - macos-26          # arm64
          - macos-15          # arm64
          - macos-15-intel    # x86
          - windows-11-arm    # arm64
          - windows-2025      # x86
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: astral-sh/setup-uv@v7.0.0
        with:
          version: "0.9.2"
      - name: Setup venv
        # XXX Python for Windows ARM64 is available through uv but is not going to be installed by default.
        # We have to explicitly install it for it to be picked-up by Nuitka.
        # https://github.com/astral-sh/uv/issues/12906
        # https://docs.astral.sh/uv/reference/cli/#uv-python
        # https://github.com/astral-sh/uv/pull/14399
        run: |
          uv venv --python ${{ matrix.os == 'windows-11-arm' && '3.13-aarch64' || '3.13' }}
      - name: Install Nuitka
        run: >
          uv pip install "nuitka [onefile] == 2.8.0"
      - name: nuitka --version
        run: |
          uv run -- nuitka --version
      - name: Build binary
        continue-on-error: true
        run: >
          uv run -- nuitka --onefile --assume-yes-for-downloads --output-filename=cli${{ runner.os == 'Windows' && '.exe' || '.bin' }} cli/__main__.py
      - name: Upload Nuitka crash report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: nuitka-crash-report-${{ matrix.os }}.xml
          if-no-files-found: warn
          path: nuitka-crash-report.xml
      - name: Install exiftool - Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt --quiet --yes install exiftool
      - name: Install exiftool - macOS
        if: runner.os == 'macOS'
        run: |
          brew install exiftool
      - name: Install exiftool - Windows
        if: runner.os == 'Windows'
        run: |
          choco install exiftool --no-progress --yes
      - name: Binary metadata
        # Ubuntu:
        #   CPU Type      : Arm 64-bits (Armv8/AArch64)
        #   CPU Type      : AMD x86-64
        # macOS:
        #   CPU Type      : ARM 64-bit
        #   CPU Type      : x86 64-bit
        # Windows
        #   Machine Type  : ARM64 little endian
        #   Machine Type  : AMD AMD64
        run: |
          exiftool${{ runner.os == 'Windows' && '.exe' || '' }} cli${{ runner.os == 'Windows' && '.exe' || '.bin' }}
      - name: Set binary permissions
        if: runner.os != 'Windows'
        run: |
          chmod +x cli.bin
      - name: Run binary
        run: |
          ls -lah
          cli${{ runner.os == 'Windows' && '.exe' || '.bin' }}

