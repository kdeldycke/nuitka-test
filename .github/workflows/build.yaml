---
# Minimal reproducer for Nuitka onefile silent-exit bug.
#
# When a package's __main__.py is compiled with:
#   nuitka --onefile mypkg/__main__.py
# the resulting binary silently exits 0 with zero output (stdout and stderr).
#
# Workaround: compile the package directory with --python-flag=-m:
#   nuitka --onefile --python-flag=-m mypkg/
name: Reproduce Nuitka onefile silent-exit bug
"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  reproduce:
    runs-on: ubuntu-24.04
    steps:

      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7.3.0

      - name: Setup
        run: |
          uv --no-progress venv --python 3.13
          uv --no-progress sync --frozen
          uv --no-progress pip install 'nuitka[onefile]==2.8.10'

      - name: Verify CLI works via Python
        run: |
          echo "=== python -m mypkg ==="
          uv run python -m mypkg
          echo "=== python -m mypkg --version ==="
          uv run python -m mypkg --version
          echo "=== console_scripts entry point ==="
          uv run mypkg-cli --version

      # ── BUG: compile __main__.py file directly ──
      # Nuitka warns: "To compile a package with a '__main__' module,
      # specify its containing directory"
      # The resulting binary silently exits 0 with zero output.
      - name: "Build: file path (BUG)"
        run: >
          uv run nuitka --onefile --assume-yes-for-downloads
          --output-filename=mypkg-file.bin mypkg/__main__.py

      - name: "Test: file path (BUG — silent exit, no output)"
        run: |
          set +e
          echo "--- mypkg-file.bin ---"
          ./mypkg-file.bin 2>&1;          echo "exit: $?"
          echo "--- mypkg-file.bin --version ---"
          ./mypkg-file.bin --version 2>&1; echo "exit: $?"
          echo "--- stdout bytes ---"
          ./mypkg-file.bin --version 2>/dev/null | wc -c

      # ── WORKAROUND: compile the package directory with --python-flag=-m ──
      # This is the approach Nuitka recommends in the warning message.
      # The binary works correctly.
      - name: "Build: package directory + -m (WORKAROUND)"
        run: >
          uv run nuitka --onefile --assume-yes-for-downloads
          --python-flag=-m --output-filename=mypkg-dir.bin mypkg/

      - name: "Test: package directory + -m (WORKS)"
        run: |
          set +e
          echo "--- mypkg-dir.bin ---"
          ./mypkg-dir.bin 2>&1;          echo "exit: $?"
          echo "--- mypkg-dir.bin --version ---"
          ./mypkg-dir.bin --version 2>&1; echo "exit: $?"
          echo "--- stdout bytes ---"
          ./mypkg-dir.bin --version 2>/dev/null | wc -c
